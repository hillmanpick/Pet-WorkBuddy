server {
    listen 80;
    listen [::]:80;
    server_name www.hillmanpick.xin hillmanpick.xin;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /download/ {
        alias /usr/share/nginx/downloads/;
        default_type application/octet-stream;
        add_header Content-Disposition "attachment";
    }

    location /workbuddy/api/ {
        proxy_pass http://workbuddy-update:8790/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;
    }

    include /etc/nginx/exam-agent/nginx.exam-agent.conf;

    location / {
        proxy_pass http://backend:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

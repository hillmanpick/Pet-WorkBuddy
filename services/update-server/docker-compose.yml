services:
  update-api:
    build: .
    container_name: workbuddy-update
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      WORKBUDDY_UPDATE_PORT: "8790"
      WORKBUDDY_UPDATE_MANIFEST: /app/data/latest.json
    volumes:
      - ./data:/app/data:ro
    expose:
      - "8790"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8790/health', timeout=2).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - openclaw

networks:
  openclaw:
    external: true
    name: openclaw-stack_default
